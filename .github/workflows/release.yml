name: Release

# Manually cut a GitHub release for the current plugin version. Nothing fires on
# merge — run this from the Actions tab (or `gh workflow run release.yml`) when
# you're ready. Notes are GitHub's auto-generated PR list, optionally prepended
# with the highlights you type into the `highlights` input.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, e.g. 0.1.6 (defaults to plugin.json)
        required: false
      highlights:
        description: Optional highlights, prepended above the auto-generated notes
        required: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version, skip if already released
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          IN_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          version="$IN_VERSION"
          if [ -z "$version" ]; then
            version="$(jq -r '.version' plugins/gauntlet/.claude-plugin/plugin.json)"
          fi
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+(\.[0-9]+)*$'; then
            echo "::error::invalid version '$version' — expected digits and dots (e.g. 0.1.6)"
            exit 1
          fi
          tag="gauntlet-v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists — nothing to do"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Compose notes — highlights (if given) over GitHub's auto-generated list
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          HIGHLIGHTS: ${{ github.event.inputs.highlights }}
          TAG: ${{ steps.gate.outputs.tag }}
        run: |
          set -euo pipefail
          tag="$TAG"
          prev="$(git tag -l 'gauntlet-v*' | sort -V | grep -vx "$tag" | tail -1 || true)"
          if [ -n "$prev" ]; then
            auto="$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
              -f tag_name="$tag" -f target_commitish="$GITHUB_SHA" \
              -f previous_tag_name="$prev" --jq '.body')"
          else
            auto="$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
              -f tag_name="$tag" -f target_commitish="$GITHUB_SHA" --jq '.body')"
          fi
          if [ -n "${HIGHLIGHTS:-}" ]; then
            printf '%s\n\n---\n\n' "$HIGHLIGHTS" > notes.md
          else
            echo "::notice::no highlights provided — shipping auto-generated notes only"
            : > notes.md
          fi
          printf '%s\n' "$auto" >> notes.md

      - name: Create tag and release
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.gate.outputs.tag }}
          VERSION: ${{ steps.gate.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "gauntlet $VERSION" \
            --notes-file notes.md \
            --latest
