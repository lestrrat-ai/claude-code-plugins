name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugins:
    name: Validate plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Pinned so a new Claude Code release can't turn CI red without a commit.
      # Bump deliberately; new versions may add validation rules.
      - name: Install Claude Code
        run: npm install -g '@anthropic-ai/claude-code@2.1.206'

      # Pinned for the same reason as Claude Code above. These commands only
      # inspect and install the local marketplace; they do not require auth.
      - name: Install Codex CLI
        run: npm install -g '@openai/codex@0.144.4'

      # The validator reads only the checkout and exercises both CLIs' isolated
      # install paths. It needs no credentials, so this works on forks.
      - name: Validate marketplace, plugins, and skills
        run: ./scripts/validate-plugins.sh

  scripts:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Shellcheck
        run: |
          mapfile -t files < <(find . -name '*.sh' -not -path './.git/*')
          printf 'checking %s\n' "${files[@]}"
          shellcheck "${files[@]}"

      - name: Python syntax
        run: |
          mapfile -t files < <(find . -name '*.py' -not -path './.git/*')
          printf 'checking %s\n' "${files[@]}"
          python3 -m py_compile "${files[@]}"

      # `py_compile` above proves the file PARSES. It says nothing about whether the code is TYPE-correct,
      # and the gap between those two is where a real defect already hid: an accessor reached for `.lineno`
      # through `ast.AST`, which does not declare it — code that compiles, runs, and is a lie about what the
      # walk yields.
      #
      # DELIBERATELY FILE-SCOPED, not repo-wide. The other scripts here are not type-clean yet, and a
      # repo-wide gate would fail builds for reasons that have nothing to do with the change under review —
      # a gate that is red for everyone is a gate nobody can use. Add each file to this list as it is fixed;
      # the list is the record of what is CLEAN, and nothing may fall back out of it.
      #
      # The `filesAnalyzed` assertion is the load-bearing half of this step, not a flourish. Pyright analyses
      # ZERO files IN SILENCE when a path matches nothing it will look at — it prints "0 errors" and exits 0.
      # A step that trusted the exit code alone would keep reporting success after a rename, while checking
      # nothing whatsoever. So the count is asserted: this step can only pass by actually having looked.
      - name: Pyright (the type-clean scripts)
        run: |
          set -o pipefail
          # Exact `# ci: pyright` markers are the SINGLE SOURCE OF TRUTH for the type-clean set. The
          # filesAnalyzed count is DERIVED from the discovered set size (`${#files[@]}`), never hardcoded.
          mapfile -t files < <(git grep -l -e '^# ci: pyright$' -- '*.py')
          if ((${#files[@]} == 0)); then
            echo "::error::no Python files carry the exact # ci: pyright marker"
            exit 1
          fi
          npx --yes pyright@1.1.410 --outputjson "${files[@]}" | tee pyright.json
          analyzed=$(jq '.summary.filesAnalyzed' pyright.json)
          expected=${#files[@]}
          echo "filesAnalyzed=${analyzed} expected=${expected}"
          if [ "${analyzed}" != "${expected}" ]; then
            echo "::error::pyright analysed ${analyzed} file(s), not the ${expected} it was pointed at — it checked" \
                 "nothing and said so quietly. Fix the paths above; a silent no-op is not a passing gate."
            exit 1
          fi
          rm -f pyright.json

      # The CI-snapshot contract, executed. The rules it pins are prose in stage-2-ci.md, and prose
      # cannot be run — three defects shipped in that prose, each of which dies instantly against a
      # fixture. If a rule is ever weakened, a fixture goes green when it must not, and this fails.
      - name: CI-snapshot contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/ci-snapshot.py self-test

      # ...and the question the step above CANNOT answer: is any rule pinned by NO fixture? Delete such a
      # rule and `self-test` still passes — total health reported while the tool has stopped checking. This
      # removes each rule in turn and FAILS if no fixture notices. It found two unpinned rules that a
      # hand-written matrix had sworn were covered, which is exactly why the matrix is now DERIVED here.
      - name: CI-snapshot mutation matrix (every rule pinned by a fixture)
        run: python3 plugins/gauntlet/skills/campaign/scripts/mutate-ci-snapshot.py

      # The PRODUCER of that snapshot, executed. `ci-snapshot.py` above can only judge an artifact somebody
      # BOTHERED to produce — and the step that produced one was a shell block in a doc, transcribed by a
      # model. It got shortcut: a driver read `gh pr checks`, saw no checks reported, and wrote ci=green.
      # ZERO EVIDENCE IS NOT GREEN. Deriving CI is now a command, and its fixtures (`ci-status-test.py`) are
      # recorded API responses driven through its real fetch path. `self-test` also runs `doc-check`, which
      # parses stage-2-ci.md's enum block, CLASSIFY tables and DECIDE order and FAILS if the prose and the
      # code that runs have drifted apart — including if the classification stopped being TOTAL over the
      # enums, and if any copy of a `gh` command in the doc has dropped a flag the code passes.
      - name: CI-status derivation contract (+ stage-2-ci.md agrees with the code)
        run: python3 plugins/gauntlet/skills/campaign/scripts/ci-status.py self-test

      # The ledger's contract, executed — including the shared table renderer it imports. `escape_cell` is
      # security-shaped: it stops a PR title from forging a column, row, or run-config line. The fixtures
      # assert injective escaping and re-parse the printed grid back to its declared columns and widths.
      - name: Ledger contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/ledger.py self-test

      # The REPAIR PASS's contract, executed — the mechanism that stops the review loop from running
      # forever. Its fixtures REPLAY the two PRs that actually spiralled (21 and 14 adversarial rounds,
      # 8.5 hours, neither converging) and assert the trigger fires where the design says AND stays silent
      # while either PR is still finding genuine defects. A re-tuned cap that would have cut a real PR off
      # mid-hunt fails here, saying so. The ledger's own self-test above runs the counter/cap fixtures;
      # this one runs the decision enum, the ownership guardrail, and the repair cap.
      # It also builds the complete reassessment bundle, selects active relaunches, and binds each decision
      # record to the exact deterministic prompt hash.
      - name: Repair-pass contract (the reassessment decision, the guardrail, the cap)
        run: python3 plugins/gauntlet/skills/campaign/scripts/repair-pass.py self-test

      # The REVIEW PASS's contract, executed — the gate one layer up from CI. What a pass's plan,
      # pass_identity and progress files say decides whether a review COUNTS, and therefore whether a PR
      # may merge; three of those four artifacts used to be hand-written and the tally hand-parsed. This
      # runs every fixture AND (like the mutation matrix above, but built in) deletes each rule in turn and
      # fails if no fixture notices — so "N rules pinned" is DERIVED here, never a claim in a report.
      - name: Review-pass contract (every rule pinned by a fixture)
        run: python3 plugins/gauntlet/skills/campaign/scripts/review-pass.py self-test

      # The finding-audit accessor's contract, executed. It binds one audit to the strict findings
      # artifact, requires exactly one evidenced result per gating finding, derives fix/refutation scope,
      # and records standoff rulings once. The sibling suite covers malformed and stale inputs, REFUTED
      # exclusion, hostile payload bytes, and atomic write failure.
      - name: Finding-audit contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/finding-audit.py self-test

      # The FOLLOW-UP store's contract, executed. Three rules here are not merely correctness rules:
      # the lifecycle graph is what makes the USER's agreement unskippable — no driver-only path reaches
      # `accepted`, and `publish` leaves from nowhere else, so an autonomous driver cannot file a GitHub
      # issue for its own uncorroborated claim; DELETION happens only once a durable record exists
      # elsewhere (a merged PR, an issue), never when work merely starts, or a PR that dies would take the
      # follow-up down with it; and the lock is what stops two concurrent runs from silently dropping an
      # entry that NOTHING can rebuild. Weaken any of them and a fixture goes red. It renders through the
      # shared table package and is checked by the ledger test's grid oracle, so a hostile PR title cannot
      # forge a column here either.
      #
      # The fixtures themselves live in the sibling `followups-test.py`, which `self-test` loads by path.
      # A MISSING sibling fails loudly — it can never report an all-clear over a suite it did not run.
      - name: Follow-up store contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/followups.py self-test

      # The durable review-learnings store's contract, executed. A SIBLING of the follow-up store: unlike its
      # intent, it ACCUMULATES and never auto-deletes, and it expires a learning to `stale`. The fixtures
      # pin the load-bearing rules: no driver-only path reaches `revoked` or writes `promoted` (both are the
      # user's), the store never deletes, a corrupt line is refused naming its line, and it renders through
      # the shared table package checked by the ledger test's grid oracle. The sibling `review-learnings-
      # test.py` is loaded by path; a MISSING sibling fails loudly.
      - name: Review-learnings store contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/review-learnings.py self-test

      # The carryover distiller's contract, executed. On a run's normal exit it projects the TERMINAL
      # ledger into `.gauntlet/history/<run-id>.md` — the record a future run reads to de-dup against
      # merged/aborted work and to be reminded of parked API-declined changes. Two refusals are load-
      # bearing and the fixtures pin both: a run with ANY non-terminal row is NOT distilled (a live run
      # has no finished history to write), and an existing file is NOT overwritten without `--force`
      # (distilled exactly once — a second exit must not clobber the first). It reuses `ledger.py`'s
      # loader so a malformed store is refused with the same strictness, and it never touches the
      # follow-up store (that source of truth is not run-scoped and is not duplicated here). The sibling
      # `carryover-test.py` is loaded by path; a MISSING sibling fails loudly, so this can never report an
      # all-clear over a suite it did not run. As with the suites above, the point of this step is that
      # `py_compile` parses these files and runs neither.
      - name: Carryover distiller contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/carryover.py self-test

      # The nudge printer's rules, executed. It reminds the orchestrator each wake of what to check —
      # the reminder inventory is owned by nudge.py's rules and pinned by its fixtures, never restated
      # here — a sticky-note printer, not gate machinery: it decides nothing and always exits 0. Each
      # fixture pins a rule with teeth
      # (fires when its condition holds, absent when it does not), so a printer that emitted every line
      # unconditionally would go red. The sibling `nudge-test.py` is loaded by path; a MISSING sibling
      # fails loudly, so this can never report health over a suite it did not run. As with the triage
      # suite (follow-up fu18), the point of this step is that `py_compile` parses these files and runs
      # neither.
      - name: Nudge printer contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/nudge.py --self-test

      # The reviewer-liveness probe's rules, executed. It reports whether a background reviewer's stdout
      # stream is still growing — a finer PROCESS-liveness signal than the unit-granular progress file —
      # by stat'ing the file only, never reading it. Like the nudge printer it decides nothing and always
      # exits 0; each fixture pins a verdict on BOTH sides of a boundary (a constant-returning probe would
      # go red). The sibling `reviewer-liveness-test.py` is loaded by path; a MISSING sibling fails loudly,
      # so this can never report health over a suite it did not run. As with the suites above, the point of
      # this step is that `py_compile` parses these files and runs neither.
      - name: Reviewer liveness probe contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/reviewer-liveness.py self-test

      # The run lease's check-and-set, executed. The lease is what stops two agents driving one run, and
      # until now it was the only durable store with no schema owner: four reference docs and an `echo`.
      # The rules worth the most here are the ones the PROSE never defined, because nobody was watching
      # them — an unparseable lease read as "absent" (which ADOPTS A LIVE RUN), a `release` that deletes
      # someone else's lease, a skewed clock manufacturing an adoption. Each is a two-driver bug and each
      # was reachable from the instructions as written. The suite also drives two REAL racing processes
      # through the real lock.
      #
      # This step exists because `py_compile` above parses these files and executes neither. A triage
      # suite shipped in this repo with no CI step at all, so a semantic regression passed CI while the
      # focused suite failed; that is follow-up fu18. The sibling `lease-test.py` is loaded by path and a
      # MISSING sibling fails loudly, so this can never report an all-clear over a suite it did not run.
      - name: Run lease contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/lease.py self-test

      # The PR-adoption tool's contract, executed. `pr-adopt.py` does the MECHANICAL half of taking a PR
      # into a run — refuse fork/foreign/closed PRs (fail closed), register the ledger row, create-or-reuse
      # the head worktree, apply the owner + reviewing labels — with the decision in a PURE `build_plan`
      # so every refusal and computed row field is pinned offline, no live GitHub. It decides no tier and
      # authors no intent; those stay the driver's. The sibling `pr-adopt-test.py` is loaded by path and a
      # MISSING sibling fails loudly, so this can never report an all-clear over a suite it did not run. As
      # with the suites above, the point of this step is that `py_compile` parses these files and runs neither.
      - name: Run pr-adopt contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/pr-adopt.py self-test

      # Deterministic campaign tier derivation, executed over real temporary Git repositories. The suite
      # pins human/code/sensitive classes, agent frontmatter, modes, renames, deletions, unknown and
      # systemic inputs, hostile path bytes, stable ordering, and stale/moving-head refusal. The sibling
      # `triage-test.py` is loaded by path and a missing or empty suite fails loudly.
      - name: Campaign tier derivation contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/triage.py self-test

      # The scheduled-heartbeat callback command, pinned. The rule it protects is the resume contract:
      # the callback carries ONLY --run and --token — never --heartbeat-id (acquire-time proof) and never
      # --new/#PR (start-time args that would mint a fresh run every heartbeat). The sibling
      # `heartbeat-test.py` is loaded by path and a MISSING sibling fails loudly, so this can never report
      # an all-clear over a suite it did not run.
      - name: Heartbeat callback contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/heartbeat.py self-test

      # The run-id tool's contract, executed. It mints a run-id and ATOMICALLY creates the run directory —
      # the `mkdir` that FAILS when the directory already exists is what stops two freshly-started runs from
      # sharing one rundir and ledger, the double-drive the lease guards one layer up. Its fixtures force a
      # collision (the mint must move to a FRESH id) and exhaust the retries (the mint must RAISE, never
      # reuse a dir), so a minter that quietly adopted an existing directory goes red. `py_compile` above
      # only parses it; the sibling `run-id-test.py` is loaded by path and a MISSING sibling fails loudly,
      # so this can never report an all-clear over a suite it did not run.
      - name: Run-id contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/run-id.py self-test

      # The base-preflight decider's contract, executed. It turns stage-2-review-gate.md's prose
      # "rebase before you review/fix if CONFLICTING/DIRTY/BEHIND" precondition into a tested check: it
      # DECIDES proceed / rebase-first / recheck from the live PR view and performs no rebase. Its fixtures
      # pin the mapping TOTALLY over both GitHub enums (one per mergeStateStatus value, plus an unrecognised
      # value that must re-poll, never guess) and drive the CLI's fail-closed `recheck` on a malformed view.
      # `py_compile` above only parses it; the sibling `base-preflight-test.py` is loaded by path and a
      # MISSING sibling fails loudly, so this can never report an all-clear over a suite it did not run.
      - name: Base-preflight contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/base-preflight.py self-test

      # The format-preflight guard's contract, executed. It turns stage-2-ci.md's PREFLIGHT prose (the
      # cheap CI-fixer must refuse to format a file whose write could land OUTSIDE the worktree — the file
      # or any path component is a symlink) into a tested command, so the check no longer depends on a model
      # hand-running `lstat` on every component. Its fixtures build REAL temp trees and drive the real walk:
      # a symlinked file, a symlinked parent (shallow and deep), a missing file, a directory, absolute paths
      # in and out of the worktree, and that a worktree behind a symlinked root is still allowed — each
      # pinned with an `ok` counterpart so a constant verdict goes red. `py_compile` above only parses it;
      # the sibling `format-preflight-test.py` is loaded by path and a MISSING sibling fails loudly.
      - name: Format-preflight contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/format-preflight.py self-test

      # The fix-worker prompt is the executed dispatch contract. Its sibling fixtures pin complete exact
      # bytes for every role and refuse missing blocks, unsafe payloads, conflicting outputs, and partial
      # publication. A prose-only dispatch can stay internally consistent while omitting a mandatory block;
      # this materializer cannot.
      - name: Fix-worker prompt contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/worker-prompt.py self-test

      # The clean-rebase EXECUTOR's contract, executed. Where base-preflight only DECIDES that a rebase is
      # due, this DOES the clean base-only case — fetch/rebase/force-with-lease push plus the ledger reset
      # (new head_sha, ci=pending, liveness counters reset; reviews_ok carried forward per the Exception
      # rule) — and REFUSES everything else: a conflict is aborted and a diff-changing rebase is reset, each
      # handed back at exit 3 so the driver's judgment path owns conflict resolution. The sibling
      # `clean-rebase-test.py` builds REAL throwaway git repos (a bare remote, a base and a PR branch, a
      # PR-head worktree) and drives the tool end to end, asserting repo/ledger state with git plumbing, not
      # exit codes alone; it is loaded by path and a MISSING sibling fails loudly.
      - name: Clean-rebase contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/clean-rebase.py self-test

      # The merge-readiness decider's contract, executed. It is the ONE place the two GitHub merge enums
      # (`.mergeable`, `.mergeStateStatus`) are crossed with the ledger's preconditions to decide `merge`
      # vs `not-yet` — the miscross this replaces once turned a blocked merge into an infinite CI watch.
      # `self-test` runs the sibling FIXTURES (`merge-check-test.py`, loaded by path; a MISSING sibling
      # fails loudly), which pin the exact verdict AND reason for every branch — including that both enums
      # are mapped TOTALLY (an unrecognized value of either PARKS) and that a gh-spawn failure fails closed.
      # The code owns the mapping; stage-3-merge.md points at the tool rather than restating it, so there is
      # no doc table to drift and no doc-check here. It NEVER performs the merge; it only decides.
      - name: Merge-check contract (the code-owned mapping, pinned by fixtures)
        run: python3 plugins/gauntlet/skills/campaign/scripts/merge-check.py self-test

      # The executor imports merge-check rather than redefining readiness. Its mocked sibling fixtures pin
      # every restart phase and ownership combination without contacting GitHub or merging a real PR.
      - name: Resumable merge execution contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/merge.py self-test

      # The status-label reconciler's contract, executed. This tool is the ONE way the gate's label swap
      # (`gauntlet-accepted` <-> `gauntlet-reviewing`) is applied, so no driver hand-runs `gh pr edit` at
      # the N gate-reset sites and misses it at one. `self-test` runs the sibling FIXTURES
      # (`label-mirror-test.py`, loaded by path; a MISSING sibling fails loudly), which drive the real
      # `mirror()` over a fake `gh` seam and pin: the exact swap argv, a no-op when the label is already
      # right, a terminal row skipped with NO gh call, an unset tier and a missing row refused (exit 2),
      # and a gh view/edit failure failing closed (exit 1). It touches only the two status labels.
      - name: Label-mirror contract (the gate and its label move together)
        run: python3 plugins/gauntlet/skills/campaign/scripts/label-mirror.py self-test

      # The reconcile fetch/detect contract, executed. `fetch` owns the canonical run-scoped query,
      # validates its raw response, refuses possible truncation, and atomically promotes `prs.json` while
      # preserving the prior file on failure. `detect` compares that snapshot against the ledger and emits
      # per-PR FACTS only; routing stays in skill prose. The sibling fixtures pin exact argv, hostile typed
      # paths, byte capture, response refusals, atomic preservation, fetch-then-detect consistency, and the
      # detector's existing fact/refusal matrix. A missing sibling fails loudly.
      - name: Reconcile snapshot contract (fetch + facts; routing stays in the skill)
        run: python3 plugins/gauntlet/skills/campaign/scripts/reconcile.py self-test

      # The Bundled Scripts table in campaign's SKILL.md declares itself COMPLETE: one row per bundled
      # script. A completeness claim with no check goes stale the first time a script lands without a
      # row — six scripts had already done exactly that before the table existed. This executes the
      # claim: a script with no row, a row naming no script, a duplicate row, or a scan that matches
      # nothing at all (the section anchor or the directory moved) each fail the build.
      - name: Script-table contract (SKILL.md inventory matches scripts/)
        run: python3 plugins/gauntlet/skills/campaign/scripts/script-table-test.py
