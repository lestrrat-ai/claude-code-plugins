name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugins:
    name: Validate plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Pinned so a new Claude Code release can't turn CI red without a commit.
      # Bump deliberately; new versions may add validation rules.
      - name: Install Claude Code
        run: npm install -g '@anthropic-ai/claude-code@2.1.206'

      # Pinned for the same reason as Claude Code above. These commands only
      # inspect and install the local marketplace; they do not require auth.
      - name: Install Codex CLI
        run: npm install -g '@openai/codex@0.144.4'

      # The validator reads only the checkout and exercises both CLIs' isolated
      # install paths. It needs no credentials, so this works on forks.
      - name: Validate marketplace, plugins, and skills
        run: ./scripts/validate-plugins.sh

  scripts:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Shellcheck
        run: |
          mapfile -t files < <(find . -name '*.sh' -not -path './.git/*')
          printf 'checking %s\n' "${files[@]}"
          shellcheck "${files[@]}"

      - name: Python syntax
        run: |
          mapfile -t files < <(find . -name '*.py' -not -path './.git/*')
          printf 'checking %s\n' "${files[@]}"
          python3 -m py_compile "${files[@]}"

      # `py_compile` above proves the file PARSES. It says nothing about whether the code is TYPE-correct,
      # and the gap between those two is where a real defect already hid: an accessor reached for `.lineno`
      # through `ast.AST`, which does not declare it — code that compiles, runs, and is a lie about what the
      # walk yields.
      #
      # DELIBERATELY FILE-SCOPED, not repo-wide. The other scripts here are not type-clean yet, and a
      # repo-wide gate would fail builds for reasons that have nothing to do with the change under review —
      # a gate that is red for everyone is a gate nobody can use. Add each file to this list as it is fixed;
      # the list is the record of what is CLEAN, and nothing may fall back out of it.
      #
      # The `filesAnalyzed` assertion is the load-bearing half of this step, not a flourish. Pyright analyses
      # ZERO files IN SILENCE when a path matches nothing it will look at — it prints "0 errors" and exits 0.
      # A step that trusted the exit code alone would keep reporting success after a rename, while checking
      # nothing whatsoever. So the count is asserted: this step can only pass by actually having looked.
      - name: Pyright (the type-clean scripts)
        run: |
          set -o pipefail
          npx --yes pyright@1.1.410 --outputjson \
            plugins/gauntlet/skills/campaign/scripts/_gauntlet/__init__.py \
            plugins/gauntlet/skills/campaign/scripts/_gauntlet/atomic.py \
            plugins/gauntlet/skills/campaign/scripts/_gauntlet/modules.py \
            plugins/gauntlet/skills/campaign/scripts/_gauntlet/jsonl.py \
            plugins/gauntlet/skills/campaign/scripts/_gauntlet/mutation.py \
            plugins/gauntlet/skills/campaign/scripts/_gauntlet/review_door.py \
            plugins/gauntlet/skills/campaign/scripts/_gauntlet/table.py \
            plugins/gauntlet/skills/campaign/scripts/_gauntlet/testing.py \
            plugins/gauntlet/skills/campaign/scripts/ledger.py \
            plugins/gauntlet/skills/campaign/scripts/ledger-test.py \
            plugins/gauntlet/skills/campaign/scripts/mutate-ci-snapshot.py \
            plugins/gauntlet/skills/campaign/scripts/review-pass.py \
            plugins/gauntlet/skills/campaign/scripts/review-pass-test.py \
            plugins/gauntlet/skills/campaign/scripts/emit-finding.py \
            plugins/gauntlet/skills/campaign/scripts/repair-pass.py \
            plugins/gauntlet/skills/campaign/scripts/repair-pass-test.py \
            plugins/gauntlet/skills/campaign/scripts/followups.py \
            plugins/gauntlet/skills/campaign/scripts/followups-test.py \
            plugins/gauntlet/skills/campaign/scripts/nudge.py \
            plugins/gauntlet/skills/campaign/scripts/nudge-test.py \
            plugins/gauntlet/skills/campaign/scripts/reviewer-liveness.py \
            plugins/gauntlet/skills/campaign/scripts/reviewer-liveness-test.py \
            plugins/gauntlet/skills/campaign/scripts/lease.py \
            plugins/gauntlet/skills/campaign/scripts/lease-test.py | tee pyright.json
          analyzed=$(jq '.summary.filesAnalyzed' pyright.json)
          echo "filesAnalyzed=${analyzed}"
          if [ "${analyzed}" != "24" ]; then
            echo "::error::pyright analysed ${analyzed} file(s), not the 24 it was pointed at — it checked" \
                 "nothing and said so quietly. Fix the paths above; a silent no-op is not a passing gate."
            exit 1
          fi
          rm -f pyright.json

      # The CI-snapshot contract, executed. The rules it pins are prose in stage-2-ci.md, and prose
      # cannot be run — three defects shipped in that prose, each of which dies instantly against a
      # fixture. If a rule is ever weakened, a fixture goes green when it must not, and this fails.
      - name: CI-snapshot contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/ci-snapshot.py self-test

      # ...and the question the step above CANNOT answer: is any rule pinned by NO fixture? Delete such a
      # rule and `self-test` still passes — total health reported while the tool has stopped checking. This
      # removes each rule in turn and FAILS if no fixture notices. It found two unpinned rules that a
      # hand-written matrix had sworn were covered, which is exactly why the matrix is now DERIVED here.
      - name: CI-snapshot mutation matrix (every rule pinned by a fixture)
        run: python3 plugins/gauntlet/skills/campaign/scripts/mutate-ci-snapshot.py

      # The PRODUCER of that snapshot, executed. `ci-snapshot.py` above can only judge an artifact somebody
      # BOTHERED to produce — and the step that produced one was a shell block in a doc, transcribed by a
      # model. It got shortcut: a driver read `gh pr checks`, saw no checks reported, and wrote ci=green.
      # ZERO EVIDENCE IS NOT GREEN. Deriving CI is now a command, and its fixtures (`ci-status-test.py`) are
      # recorded API responses driven through its real fetch path. `self-test` also runs `doc-check`, which
      # parses stage-2-ci.md's enum block, CLASSIFY tables and DECIDE order and FAILS if the prose and the
      # code that runs have drifted apart — including if the classification stopped being TOTAL over the
      # enums, and if any copy of a `gh` command in the doc has dropped a flag the code passes.
      - name: CI-status derivation contract (+ stage-2-ci.md agrees with the code)
        run: python3 plugins/gauntlet/skills/campaign/scripts/ci-status.py self-test

      # The ledger's contract, executed — including the shared table renderer it imports. `escape_cell` is
      # security-shaped: it stops a PR title from forging a column, row, or run-config line. The fixtures
      # assert injective escaping and re-parse the printed grid back to its declared columns and widths.
      - name: Ledger contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/ledger.py self-test

      # The REPAIR PASS's contract, executed — the mechanism that stops the review loop from running
      # forever. Its fixtures REPLAY the two PRs that actually spiralled (21 and 14 adversarial rounds,
      # 8.5 hours, neither converging) and assert the trigger fires where the design says AND stays silent
      # while either PR is still finding genuine defects. A re-tuned cap that would have cut a real PR off
      # mid-hunt fails here, saying so. The ledger's own self-test above runs the counter/cap fixtures;
      # this one runs the decision enum, the ownership guardrail, and the repair cap.
      - name: Repair-pass contract (the reassessment decision, the guardrail, the cap)
        run: python3 plugins/gauntlet/skills/campaign/scripts/repair-pass.py self-test

      # The REVIEW PASS's contract, executed — the gate one layer up from CI. What a pass's plan,
      # pass_identity and progress files say decides whether a review COUNTS, and therefore whether a PR
      # may merge; three of those four artifacts used to be hand-written and the tally hand-parsed. This
      # runs every fixture AND (like the mutation matrix above, but built in) deletes each rule in turn and
      # fails if no fixture notices — so "N rules pinned" is DERIVED here, never a claim in a report.
      - name: Review-pass contract (every rule pinned by a fixture)
        run: python3 plugins/gauntlet/skills/campaign/scripts/review-pass.py self-test

      # The FOLLOW-UP store's contract, executed. Three rules here are not merely correctness rules:
      # the lifecycle graph is what makes the USER's agreement unskippable — no driver-only path reaches
      # `accepted`, and `publish` leaves from nowhere else, so an autonomous driver cannot file a GitHub
      # issue for its own uncorroborated claim; DELETION happens only once a durable record exists
      # elsewhere (a merged PR, an issue), never when work merely starts, or a PR that dies would take the
      # follow-up down with it; and the lock is what stops two concurrent runs from silently dropping an
      # entry that NOTHING can rebuild. Weaken any of them and a fixture goes red. It renders through the
      # shared table package and is checked by the ledger test's grid oracle, so a hostile PR title cannot
      # forge a column here either.
      #
      # The fixtures themselves live in the sibling `followups-test.py`, which `self-test` loads by path.
      # A MISSING sibling fails loudly — it can never report an all-clear over a suite it did not run.
      - name: Follow-up store contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/followups.py self-test

      # The nudge printer's rules, executed. It reminds the orchestrator each wake of what to check
      # (heartbeat armed, fan out work, PR labels, a review that may have died) — a sticky-note printer,
      # not gate machinery: it decides nothing and always exits 0. Each fixture pins a rule with teeth
      # (fires when its condition holds, absent when it does not), so a printer that emitted every line
      # unconditionally would go red. The sibling `nudge-test.py` is loaded by path; a MISSING sibling
      # fails loudly, so this can never report health over a suite it did not run. As with the triage
      # suite (follow-up fu18), the point of this step is that `py_compile` parses these files and runs
      # neither.
      - name: Nudge printer contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/nudge.py --self-test

      # The reviewer-liveness probe's rules, executed. It reports whether a background reviewer's stdout
      # stream is still growing — a finer PROCESS-liveness signal than the unit-granular progress file —
      # by stat'ing the file only, never reading it. Like the nudge printer it decides nothing and always
      # exits 0; each fixture pins a verdict on BOTH sides of a boundary (a constant-returning probe would
      # go red). The sibling `reviewer-liveness-test.py` is loaded by path; a MISSING sibling fails loudly,
      # so this can never report health over a suite it did not run. As with the suites above, the point of
      # this step is that `py_compile` parses these files and runs neither.
      - name: Reviewer liveness probe contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/reviewer-liveness.py self-test

      # The run lease's check-and-set, executed. The lease is what stops two agents driving one run, and
      # until now it was the only durable store with no schema owner: four reference docs and an `echo`.
      # The rules worth the most here are the ones the PROSE never defined, because nobody was watching
      # them — an unparseable lease read as "absent" (which ADOPTS A LIVE RUN), a `release` that deletes
      # someone else's lease, a skewed clock manufacturing an adoption. Each is a two-driver bug and each
      # was reachable from the instructions as written. The suite also drives two REAL racing processes
      # through the real lock.
      #
      # This step exists because `py_compile` above parses these files and executes neither. A triage
      # suite shipped in this repo with no CI step at all, so a semantic regression passed CI while the
      # focused suite failed; that is follow-up fu18. The sibling `lease-test.py` is loaded by path and a
      # MISSING sibling fails loudly, so this can never report an all-clear over a suite it did not run.
      - name: Run lease contract
        run: python3 plugins/gauntlet/skills/campaign/scripts/lease.py self-test
